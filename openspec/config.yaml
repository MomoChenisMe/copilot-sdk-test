schema: spec-driven
locale: tw

context: |
  ## 專案
  CodeForge — 個人 AI 開發終端機（Greenfield 綠地專案）
  跑在 Linux VPS 上的 Web 應用，透過手機瀏覽器操控 AI 開發工具。
  兩個核心能力：Copilot Agent 寫程式、Terminal 操作 Shell。
  個人工具，單人使用，GitHub Copilot 訂閱制認證。

  ## 強制約束
  1. **TDD**：紅燈 → 綠燈 → 重構，無例外。任何功能實作前必須先撰寫對應測試。
  2. **ESM**：全專案 `"type": "module"`，import 路徑使用 `.js` 副檔名。
  3. **Strict TypeScript**：`strict: true`，target ES2024，禁止 `any`。
  4. **Monorepo**：npm workspaces（`backend/` + `frontend/`），共用 `tsconfig.base.json`。
  5. **Conventional Commits**：`feat:` / `fix:` / `chore:` / `refactor:` / `test:` / `docs:`。
  6. **Node.js ≥ 24**：使用 `node:crypto`、`node:fs/promises` 等原生模組。

  ## 架構
  ```
  手機瀏覽器 (HTTPS/WSS)
    → Nginx (TLS 1.2+ / Let's Encrypt + 反向代理)
      → Node.js + Express 5 + WebSocket
        ├── Copilot SDK → GitHub API
        ├── MCP Client → MCP Servers
        ├── node-pty (Terminal)
        └── SQLite (對話 + 任務 + 排程 + 記憶)
  ```
  部署：systemd service（`ai-terminal.service`），以 `ai-terminal` 使用者運行於 `/opt/ai-terminal`。

  ## 後端技術棧
  | 用途 | 套件 | 版本 |
  |------|------|------|
  | AI 對話 | `@github/copilot-sdk` | ^0.1.25 |
  | MCP 整合 | `@modelcontextprotocol/sdk` | ^1.26.0 |
  | HTTP server | `express` | ^5.1.0 |
  | WebSocket | `ws` | ^8.18.0 |
  | Terminal | `node-pty` | ^1.1.0 |
  | 資料庫 | `better-sqlite3` | ^12.6.0 |
  | 密碼雜湊 | `bcrypt` | ^6.0.0 |
  | UUID | `uuid` | ^11.1.0 |
  | Schema 驗證 | `zod` | ^3.24.0 |
  | 日誌 | `pino` + `pino-pretty` | ^9.6.0 |
  | 排程 | `croner` | ^10.0.1 |
  | 檔案監控 | `chokidar` | ^5.0.0 |
  | 檔案上傳 | `multer` | ^2.0.2 |
  | Zip 處理 | `adm-zip` | ^0.5.16 |
  | Push 通知 | `web-push` | ^3.6.7 |
  | YAML 解析 | `js-yaml` | ^4.1.1 |
  | TS 執行 | `tsx` | ^4.19.0 |
  | 測試 | `vitest` + `supertest` | ^3.0.0 / ^7.2.2 |

  ## 後端模組清單
  | 模組路徑 | 職責 |
  |----------|------|
  | `src/index.ts` | 應用程式入口，`createApp()` factory 組裝所有模組 |
  | `src/config.ts` | Zod 驗證環境變數，匯出 `Config` type |
  | `src/auth/` | Web 認證：密碼登入 + session cookie + CSRF + rate limiting + lockout + activity log |
  | `src/conversation/` | 對話管理：SQLite `initDb()` + migration + `ConversationRepository` + REST routes |
  | `src/copilot/` | Copilot SDK：`ClientManager` + `SessionManager` + `StreamManager` + models/auth/context routes |
  | `src/copilot/tools/` | AI-callable 工具：task-tools、web-search、cron-config-tools |
  | `src/ws/` | WebSocket server + prefix-based router + handler types (`WsHandler` / `WsHandlerObject`) |
  | `src/ws/handlers/` | WS handlers：copilot、terminal、cwd、bash-exec |
  | `src/mcp/` | MCP 管理：client、config loader、tool adapter、routes |
  | `src/memory/` | Auto-memory：store + index + extractor + LLM gating/compaction |
  | `src/prompts/` | Prompt 檔案管理：PROFILE.md / AGENT.md file store + composer + routes |
  | `src/skills/` | Skill 管理：file store + builtin store + installer (zip) + routes |
  | `src/task/` | 任務管理：SQLite-backed tasks with blocks/blockedBy |
  | `src/terminal/` | PTY 終端管理：node-pty wrapper + routes |
  | `src/openspec/` | OpenSpec 檔案讀取 + chokidar watcher + routes |
  | `src/push/` | Web Push (VAPID)：push store + push service + routes |
  | `src/cron/` | 對話級 Cron 排程器（croner） |
  | `src/directory/` | 目錄列表 REST routes |
  | `src/github/` | GitHub API proxy routes |
  | `src/upload/` | 檔案上傳 routes（multer） |
  | `src/settings/` | 前端設定持久化：store + routes |
  | `src/utils/` | 工具：`logger.ts`（pino）、`graceful-shutdown.ts` |

  ## 通訊模式
  | 通道 | 用途 | 格式 |
  |------|------|------|
  | REST API (`/api/*`) | CRUD、認證、系統狀態、模型列表 | JSON request/response |
  | WebSocket (`/ws`) | AI 串流、Terminal 即時輸出、雙向互動 | JSON `{ type, data? }`，prefix:action 路由 |
  | Server Event (broadcast) | OpenSpec 變更通知等 server-push 事件 | WS broadcast `{ type, data }` |
  | File System | Prompt 檔案、Skill 檔案、SQLite DB、OpenSpec YAML | 直接讀寫 + chokidar 監控 |

  ## 前端技術棧
  | 用途 | 套件 | 版本 |
  |------|------|------|
  | UI 框架 | `react` + `react-dom` | ^19.0.0 |
  | 建置 | `vite` + `@vitejs/plugin-react` | ^6.1.0 |
  | CSS | `tailwindcss` + `@tailwindcss/vite` + `@tailwindcss/typography` | ^4.0.0 |
  | 狀態管理 | `zustand` | ^5.0.0 |
  | Terminal | `@xterm/xterm` + `@xterm/addon-fit` + `@xterm/addon-web-links` | ^6.0.0 |
  | Markdown | `react-markdown` + `rehype-highlight` + `remark-gfm` | ^10.1.0 |
  | 圖表 | `mermaid` | ^11.12.2 |
  | 圖示 | `lucide-react` | ^0.474.0 |
  | 國際化 | `i18next` + `react-i18next` | ^25.8.7 |
  | 測試 | `vitest` + `@testing-library/react` + `jsdom` | ^3.2.4 |

  ## 後端命名慣例
  - 檔名：`kebab-case.ts`（例：`stream-manager.ts`、`rate-limiter.ts`）
  - Class / Interface / Type：`PascalCase`（例：`ConversationRepository`、`WsHandlerObject`）
  - Factory function：`createXxxRoutes(deps): Router`、`createXxxHandler(deps): WsHandler`
  - ESM import：路徑必須帶 `.js` 副檔名（例：`import { logger } from '../utils/logger.js'`）
  - 模組結構：每個模組資料夾含 `routes.ts`（REST）、`repository.ts` 或 `manager.ts`（邏輯）、`types.ts`（型別）
  - Config：`config.ts` 使用 Zod schema 驗證環境變數

  ## 前端命名慣例
  - React 元件：`PascalCase.tsx`（例：`ChatView.tsx`、`ModelSelector.tsx`）
  - Hooks：`use*.ts` prefix（例：`useWebSocket.ts`、`useAuth.ts`），放在 `hooks/` 目錄
  - API 模組：`*-api.ts`（例：`openspec-api.ts`、`github-api.ts`），放在 `lib/` 目錄
  - 通用工具：放在 `lib/` 目錄（例：`api.ts`、`ws-client.ts`、`ws-types.ts`）
  - 狀態管理：單一 Zustand store `store/index.ts`（`useAppStore`），包含所有全域狀態
  - 元件目錄：`components/auth/`、`components/copilot/`、`components/layout/`、`components/shared/`、`components/terminal/`、`components/settings/`、`components/openspec/`

  ## 資料庫慣例
  - Engine：`better-sqlite3`（同步、native bindings）
  - WAL mode：`db.pragma('journal_mode = WAL')`
  - Foreign keys：`db.pragma('foreign_keys = ON')`
  - Table / Column 命名：`snake_case`（例：`sdk_session_id`、`created_at`）
  - Primary Key：`TEXT` 類型 UUID（`randomUUID()` from `node:crypto`）
  - Timestamp：`TEXT` 類型 ISO-8601，`DEFAULT datetime('now')`
  - JSON 欄位：`TEXT` 類型存放序列化 JSON（例：`metadata`、`blocks`、`blocked_by`）
  - 全文搜尋：FTS5 virtual table + trigger 同步
  - Migration：`initDb()` 中以 `CREATE TABLE IF NOT EXISTS` + `ALTER TABLE ... ADD COLUMN`（try/catch 跳過已存在）實作 idempotent migration
  - TypeScript mapping：DB `snake_case` → TS DTO `camelCase`
  - 兩個 DB 檔案：`conversations.db`（主資料）、`memory-index.db`（auto-memory 索引）

  ## 安全慣例
  - 密碼：`bcrypt` hash（cost 10），`WEB_PASSWORD` 最少 8 字元（Zod 驗證）
  - Session：UUID token 存 SQLite `sessions` table，7 天過期，HttpOnly cookie
  - CSRF：double-submit cookie pattern，`csrf` cookie 配合 `X-CSRF-Token` header
  - Rate limiting：in-memory IP-based，5 次失敗 / 60 秒滑動窗口
  - Account lockout：SQLite-backed，10 次連續失敗鎖定 15 分鐘
  - Activity log：`session_activity_log` table 記錄登入事件
  - WebSocket auth：HTTP Upgrade 時驗證 session cookie
  - systemd hardening：`NoNewPrivileges=true`、`ProtectSystem=strict`、`ReadWritePaths` 限定

  ## 版控與部署
  - Conventional Commits：`feat:` / `fix:` / `chore:` / `refactor:` / `test:` / `docs:`
  - systemd service：`ai-terminal.service`，以 `ai-terminal` 使用者運行
  - Nginx 反向代理：TLS 1.2+（Let's Encrypt）、安全 headers、WebSocket proxy
  - 部署腳本：`scripts/deploy.sh`（local build → rsync → remote npm install → rebuild native → restart service）
  - SSL 設定：`scripts/setup-ssl.sh`（Let's Encrypt）
  - 健康檢查：`scripts/smoke-test.sh`（post-deploy）

rules:
  proposal:
    - 使用繁體中文撰寫，技術術語保留英文原名
    - 必須說明功能的目標使用者和使用情境
    - 必須包含「非目標 (Non-Goals)」段落，明確排除不在範圍內的事項
    - 必須指明影響的 backend 模組路徑（例：`src/copilot/`、`src/conversation/`）
    - 涉及新 REST API 端點需列出 HTTP method + path（例：`POST /api/conversations/:id/archive`）
    - 涉及新 WebSocket 訊息需列出 type prefix（例：`memory:query`）
    - 涉及 SQLite schema 變更需明確註明（新增 table / column / index）
    - 涉及前端需指明元件目錄（例：`components/copilot/`）和 Zustand store 變更
    - 範圍控制：每個 proposal 限定單一功能或一組密切相關的功能
    - 禁止過度工程：這是個人工具，不需要企業級方案（不需 DI container、message queue、multi-tenant）
  specs:
    - 使用繁體中文撰寫，技術術語保留英文原名
    - 使用 WHEN/THEN 格式撰寫場景
    - 必須涵蓋正常流程和異常流程
    - 每個需求必須是可測試的（可直接對應到測試案例）
    - 使用 SHALL/MUST 表達規範性需求
    - REST API 規格格式：HTTP method、path、request body、response body、error codes
    - 查詢不到資源回傳 `404`，空列表回傳 `200 []`
    - WebSocket 訊息規格格式：type（prefix:action）、request payload、response type + payload
    - DB 欄位規格格式：`snake_case` column name、SQLite type、constraints、對應 TS type
    - Timestamp 欄位一律 `TEXT` 類型 ISO-8601 + `DEFAULT datetime('now')`
    - 前端互動場景描述格式：使用者操作 → UI 狀態變化 → API/WS 呼叫 → 最終結果
    - Zustand store 變更需列出新增/修改的 state 欄位和 action
    - 必須涵蓋 loading / error / empty states
    - WebSocket handler type 格式參照 `WsHandler`（function）或 `WsHandlerObject`（stateful object with `onMessage` + `onDisconnect`）
    - 涉及 FTS5 搜尋需描述搜尋行為及排名邏輯
  design:
    - 使用繁體中文撰寫，技術術語保留英文原名
    - 每個技術決策必須列出至少一個替代方案及其取捨
    - 必須包含風險與緩解策略
    - Backend 分層結構：`routes.ts`（Express Router）→ `repository.ts` / `manager.ts`（業務邏輯）→ `types.ts`（型別定義）
    - Factory pattern：route factory `createXxxRoutes(deps)` 回傳 Router，WS handler factory `createXxxHandler(deps)` 回傳 WsHandler
    - Config 驗證使用 Zod schema（參照 `src/config.ts` 模式）
    - 前端狀態統一使用 Zustand（`store/index.ts` 的 `useAppStore`）
    - React hooks 放 `hooks/`、API client 放 `lib/*-api.ts`
    - WS 訊息採用 `prefix:action` 格式 + `registerHandler()` 註冊到 router
    - 禁止不必要的抽象層（DI container、event bus、message queue、ORM）
    - 優先使用 SQLite 已有功能（FTS5、JSON functions、window functions）+ Node.js 原生 API
    - 避免引入新 npm dependency 除非有明確必要，優先用已有套件解決
  tasks:
    - 使用繁體中文撰寫，技術術語保留英文原名
    - 嚴格遵循 TDD 順序：先寫測試 → 再實作 → 最後重構，禁止先實作後補測試
    - 格式範例：「1.1 撰寫 XXX 測試」→「1.2 實作 XXX 功能」→「1.3 重構 XXX」
    - 每個階段結束須包含編譯或測試驗證步驟
    - Backend 測試：Vitest + native fetch，測試檔放 `backend/tests/` mirror `src/` 結構
    - Frontend 測試：Vitest + `@testing-library/react` + jsdom，測試檔放 `frontend/tests/` mirror `src/` 結構
    - 測試檔命名 `*.test.ts`（backend）/ `*.test.tsx`（frontend），使用 `describe` / `it` / `expect`
    - DB schema 變更需獨立 task step，在 `conversation/db.ts` 的 `initDb()` 中新增 idempotent migration
    - 任務粒度 ≤ 2 小時
    - 每個任務須標明影響的檔案路徑
    - 同時涉及 backend + frontend 時，先完成 backend API 再做 frontend
    - 新模組需包含 `routes.ts` + `types.ts` + 對應測試的建立步驟
